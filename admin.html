<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI KICK MASTER · 관리자</title>
<style>
:root {
  --navy: #0A1628;
  --blue: #4ca3ff;
  --gold: #E8A020;
  --red: #D92B3A;
  --green: #2ecc71;
  --card: rgba(255,255,255,0.045);
  --border: rgba(76,163,255,0.22);
  --muted: #7a90aa;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(circle at top, #142a4a 0, var(--navy) 44%, #050b14 100%);
  color: #fff;
  font-family: 'Noto Sans KR', 'Gothic A1', system-ui, sans-serif;
  min-height: 100vh;
}
button, input { font-family: inherit; }
button:disabled { opacity: .45; cursor: not-allowed !important; }
code { color: #dcecff; font-weight: 800; }

/* 로그인 */
#loginWrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
#loginWrap.hidden { display: none; }
.login-box {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 22px; padding: 44px 40px; width: 380px; text-align: center;
  box-shadow: 0 24px 70px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08);
  backdrop-filter: blur(10px);
}
.login-box h1 { font-size: 24px; font-weight: 950; margin-bottom: 6px; letter-spacing: -.4px; }
.login-box h1 span { color: var(--gold); }
.login-box p { font-size: 12px; color: var(--muted); margin-bottom: 26px; }
.security-note { margin-top: 14px; font-size: 11px; line-height: 1.45; color: #5d718d; }
.f-input {
  width: 100%; padding: 13px 16px; margin-bottom: 12px;
  background: rgba(255,255,255,0.065); border: 1.5px solid var(--border);
  border-radius: 11px; color: #fff; font-size: 15px; outline: none;
}
.f-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(76,163,255,.11); }
.f-input::placeholder { color: #52677f; }
.btn-primary, .btn-add {
  border: none; border-radius: 11px; color: #fff; font-size: 14px; font-weight: 900; cursor: pointer;
  background: linear-gradient(180deg, #5ab0ff, #2877d7);
}
.btn-primary { width: 100%; padding: 14px; font-size: 15px; }
.btn-primary:hover, .btn-add:hover, .btn-save:hover { opacity: 0.9; }
.err-msg { color: #ff6b7d; font-size: 13px; margin-top: 8px; min-height: 18px; }
.ok-msg { color: var(--green); font-size: 13px; margin-top: 8px; min-height: 18px; }

/* 대시보드 */
#dashboard { display: none; padding: 28px 32px 18px; max-width: 1180px; margin: 0 auto; }
#dashboard.show { display: block; }
.top-bar { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 22px; }
.top-bar h2 { font-size: 22px; font-weight: 950; letter-spacing: -.4px; }
.top-bar h2 span { color: var(--gold); }
.top-sub { margin-top: 6px; color: var(--muted); font-size: 12px; }
.top-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.btn-add { padding: 10px 18px; }
.btn-ghost { background: rgba(255,255,255,0.09) !important; }
.btn-danger-soft { background: rgba(217,43,58,0.18) !important; color: #ff8795 !important; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
.stat-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 15px; padding: 18px; text-align: center; }
.stat-card .num { font-size: 31px; font-weight: 950; color: var(--blue); line-height: 1; }
.stat-card .label { font-size: 12px; color: var(--muted); margin-top: 7px; }

.toolbar {
  display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center;
  background: var(--card); border: 1.5px solid var(--border); border-radius: 15px; padding: 12px; margin-bottom: 16px;
}
.toolbar .f-input { margin: 0; }
.select-filter {
  height: 44px; min-width: 126px; background: rgba(255,255,255,0.065); color: #fff;
  border: 1.5px solid var(--border); border-radius: 11px; padding: 0 12px; font-weight: 800;
}

.table-wrap { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: rgba(76,163,255,0.1); padding: 13px 12px; font-size: 12px; color: #94a9c2; font-weight: 800; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { padding: 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.055); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.03); }
.sub-text { display:block; color:#71859d; font-size:11px; margin-top:3px; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; white-space: nowrap; }
.badge.active { background: rgba(46,204,113,0.15); color: var(--green); }
.badge.expired { background: rgba(217,43,58,0.15); color: #ff687a; }
.badge.inactive { background: rgba(255,255,255,0.08); color: #8b98a8; }
.badge.soon { background: rgba(232,160,32,0.17); color: #ffd76b; }
.action-btns { display: flex; gap: 7px; flex-wrap: wrap; min-width: 255px; }
.btn-sm { padding: 6px 10px; border-radius: 8px; font-size: 12px; font-weight: 900; cursor: pointer; border: none; }
.btn-edit { background: rgba(76,163,255,0.15); color: var(--blue); }
.btn-copy { background: rgba(46,204,113,0.14); color: #64f3a4; }
.btn-extend { background: rgba(232,160,32,0.15); color: var(--gold); }
.btn-toggle { background: rgba(255,255,255,0.09); color: #d5dfeb; }
.btn-del { background: rgba(217,43,58,0.15); color: #ff6b7d; }
.empty-msg, .loading { text-align: center; padding: 48px; color: #60748c; }

/* 모달 */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.74); z-index: 999; align-items: center; justify-content: center; padding: 18px; }
.modal-bg.show { display: flex; }
.modal { background: #0f1e35; border: 1.5px solid var(--border); border-radius: 20px; padding: 32px; width: 440px; max-width: 96vw; max-height: 92vh; overflow: auto; box-shadow: 0 25px 80px rgba(0,0,0,.38); }
.modal h3 { font-size: 19px; font-weight: 950; margin-bottom: 22px; }
.modal h3 span { color: var(--gold); }
.modal label { font-size: 12px; color: #9aadc5; font-weight: 800; display: block; margin-bottom: 6px; }
.modal .f-input { margin-bottom: 14px; }
.modal-help { color: #7f91a8; font-size: 12px; line-height: 1.45; margin: -5px 0 12px; }
.modal-btns { display: flex; gap: 10px; margin-top: 10px; }
.modal-btns button { flex: 1; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 950; cursor: pointer; }
.btn-cancel { background: rgba(255,255,255,0.08); color: #b9c4d2; }
.btn-save { background: var(--blue); color: #fff; }
.quick-row { display: grid; grid-template-columns: repeat(3,1fr); gap:8px; margin: -4px 0 14px; }
.quick-row button { padding: 9px 6px; border: none; border-radius: 9px; background: rgba(232,160,32,.15); color: var(--gold); font-weight: 900; cursor: pointer; }
.footer-note { color: #4f637c; font-size: 11px; text-align: right; margin-top: 12px; }

@media (max-width: 820px) {
  #dashboard { padding: 18px 12px; }
  .top-bar { flex-direction: column; }
  .top-actions { justify-content: flex-start; }
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .toolbar { grid-template-columns: 1fr; }
  .table-wrap { overflow-x: auto; }
  table { min-width: 960px; }
}
</style>
</head>
<body>

<div id="loginWrap">
  <div class="login-box">
    <h1>AI <span>KICK</span> MASTER</h1>
    <p>관리자 전용 페이지</p>
    <input id="adminPw" class="f-input" type="password" placeholder="관리자 비밀번호" autocomplete="current-password" />
    <button class="btn-primary" onclick="adminLogin()">로그인</button>
    <div class="err-msg" id="adminErr"></div>
    <div class="security-note">관리자 비밀번호는 Supabase DB에 저장됩니다. 모든 기기에서 동일하게 적용됩니다.</div>
  </div>
</div>

<div id="dashboard">
  <div class="top-bar">
    <div>
      <h2>AI <span>KICK</span> MASTER · 도장 관리</h2>
      <div class="top-sub">계정 추가, 만료일 연장, 중지/활성, 안내문 복사를 한 화면에서 처리합니다.</div>
    </div>
    <div class="top-actions">
      <button class="btn-add btn-ghost" onclick="openPwModal()">🔑 관리자 비밀번호 변경</button>
      <button class="btn-add btn-ghost" onclick="loadDojangs()">↻ 새로고침</button>
      <button class="btn-add" onclick="openAddModal()">+ 도장 추가</button>
      <button class="btn-add btn-danger-soft" onclick="logoutAdmin()">로그아웃</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statTotal">-</div><div class="label">전체 도장</div></div>
    <div class="stat-card"><div class="num" id="statActive" style="color:var(--green)">-</div><div class="label">이용 중</div></div>
    <div class="stat-card"><div class="num" id="statSoon" style="color:var(--gold)">-</div><div class="label">7일 이내 만료</div></div>
    <div class="stat-card"><div class="num" id="statExpired" style="color:var(--red)">-</div><div class="label">만료됨</div></div>
  </div>

  <div class="toolbar">
    <input id="searchInput" class="f-input" type="search" placeholder="도장명, 관장명, 아이디, 연락처 검색" oninput="renderTable()" />
    <select id="statusFilter" class="select-filter" onchange="renderTable()">
      <option value="all">전체</option>
      <option value="active">이용 중</option>
      <option value="soon">만료 임박</option>
      <option value="expired">만료됨</option>
      <option value="inactive">비활성</option>
    </select>
    <button class="btn-add btn-ghost" onclick="clearFilters()">검색 초기화</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>도장명</th><th>관장명</th><th>아이디</th><th>연락처</th><th>만료일</th><th>상태</th><th>관리</th>
        </tr>
      </thead>
      <tbody id="dojangsTable"><tr><td colspan="7" class="loading">불러오는 중...</td></tr></tbody>
    </table>
  </div>
  <div class="footer-note">admin.html · improved 2026-06-24</div>
</div>

<div class="modal-bg" id="pwModalBg">
  <div class="modal">
    <h3>🔑 관리자 비밀번호 <span>변경</span></h3>
    <label>현재 비밀번호</label><input id="pwCurrent" class="f-input" type="password" placeholder="현재 비밀번호" />
    <label>새 비밀번호</label><input id="pwNew" class="f-input" type="password" placeholder="새 비밀번호 8자 이상 권장" />
    <label>새 비밀번호 확인</label><input id="pwConfirm" class="f-input" type="password" placeholder="새 비밀번호 재입력" />
    <div class="err-msg" id="pwErr"></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closePwModal()">취소</button><button class="btn-save" onclick="changePassword()">변경</button></div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">도장 <span>추가</span></h3>
    <input type="hidden" id="editId" />
    <label>도장명 *</label><input id="mDojang" class="f-input" type="text" placeholder="예) 구미태권도장" />
    <label>관장명</label><input id="mOwner" class="f-input" type="text" placeholder="예) 홍길동" />
    <label>연락처</label><input id="mPhone" class="f-input" type="text" placeholder="예) 010-1234-5678" />
    <label>아이디 *</label><input id="mUser" class="f-input" type="text" placeholder="예) gumi01" />
    <label id="passLabel">비밀번호 *</label><input id="mPass" class="f-input" type="text" placeholder="예) tkd1234!" />
    <div class="modal-help" id="passHelp">수정할 때 비밀번호를 비워두면 기존 비밀번호가 유지됩니다.</div>
    <label>만료일 *</label><input id="mExpiry" class="f-input" type="date" />
    <div class="quick-row"><button onclick="quickExpiry(1)">+1개월</button><button onclick="quickExpiry(3)">+3개월</button><button onclick="quickExpiry(12)">+1년</button></div>
    <div class="err-msg" id="modalErr"></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" id="saveBtn" onclick="saveDojang()">저장</button></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ebgoolsymyzkftvavpyj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_378Ep28vw4J9Sia2OsN6-Q_gqnu5OQJ';
const LOGIN_URL = 'https://aikickmaster.kr/kick_test.html';
let ADMIN_PASSWORD = ''; // Supabase에서 로드
let DOJJANGS = [];

// Supabase에서 관리자 비밀번호 가져오기
async function loadAdminPassword() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/admin_settings?key=eq.admin_password&select=value`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      ADMIN_PASSWORD = data[0].value;
    }
  } catch (e) {
    console.error('관리자 비밀번호 로드 실패', e);
  }
}

// Supabase에 관리자 비밀번호 저장
async function saveAdminPassword(newPw) {
  await fetch(`${SUPABASE_URL}/rest/v1/admin_settings?key=eq.admin_password`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({ value: newPw })
  });
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function addMonths(dateStr, months) {
  const base = dateStr ? new Date(dateStr + 'T00:00:00') : new Date();
  if (Number.isNaN(base.getTime())) return todayStr();
  base.setMonth(base.getMonth() + months);
  return base.toISOString().slice(0,10);
}
function daysLeft(expiresAt) {
  const t = new Date(todayStr() + 'T00:00:00');
  const e = new Date(expiresAt + 'T00:00:00');
  return Math.ceil((e - t) / 86400000);
}

function openPwModal() {
  ['pwCurrent','pwNew','pwConfirm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pwErr').textContent = '';
  document.getElementById('pwModalBg').classList.add('show');
}
function closePwModal() { document.getElementById('pwModalBg').classList.remove('show'); }
async function changePassword() {
  const current = document.getElementById('pwCurrent').value;
  const newPw = document.getElementById('pwNew').value;
  const confirm = document.getElementById('pwConfirm').value;
  const errEl = document.getElementById('pwErr');
  if (current !== ADMIN_PASSWORD) { errEl.textContent = '현재 비밀번호가 올바르지 않습니다.'; return; }
  if (newPw.length < 6) { errEl.textContent = '새 비밀번호는 6자 이상으로 입력해주세요.'; return; }
  if (newPw !== confirm) { errEl.textContent = '새 비밀번호가 일치하지 않습니다.'; return; }
  try {
    await saveAdminPassword(newPw);
    ADMIN_PASSWORD = newPw;
    closePwModal();
    alert('✅ 관리자 비밀번호가 변경되었습니다.\n모든 기기에 즉시 적용됩니다.');
  } catch (e) {
    errEl.textContent = '저장 실패: ' + e.message;
  }
}

async function adminLogin() {
  const pw = document.getElementById('adminPw').value;
  const errEl = document.getElementById('adminErr');
  errEl.textContent = '확인 중...';
  if (!ADMIN_PASSWORD) await loadAdminPassword();
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('akm_admin_logged_in', '1');
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.add('show');
    loadDojangs();
  } else {
    errEl.textContent = '비밀번호가 올바르지 않습니다.';
  }
}
function logoutAdmin() {
  sessionStorage.removeItem('akm_admin_logged_in');
  document.getElementById('dashboard').classList.remove('show');
  document.getElementById('loginWrap').classList.remove('hidden');
  document.getElementById('adminPw').value = '';
}
document.getElementById('adminPw').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  const text = await res.text();
  let data = null;
  try { data = text ? JSON.parse(text) : null; } catch { data = text; }
  if (!res.ok) {
    const msg = data?.message || data?.hint || text || `요청 실패 (${res.status})`;
    throw new Error(msg);
  }
  return method === 'DELETE' ? true : data;
}

async function loadDojangs() {
  const tbody = document.getElementById('dojangsTable');
  tbody.innerHTML = '<tr><td colspan="7" class="loading">불러오는 중...</td></tr>';
  try {
    DOJJANGS = await api('GET', '/rest/v1/dojangs?select=*&order=created_at.desc');
    updateStats();
    renderTable();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">불러오기 실패: ${escapeHtml(err.message)}</td></tr>`;
  }
}
function getStatus(d) {
  const left = daysLeft(d.expires_at);
  if (!d.is_active) return { key:'inactive', text:'비활성', cls:'inactive', left };
  if (left < 0) return { key:'expired', text:'만료', cls:'expired', left };
  if (left <= 7) return { key:'soon', text:'만료 임박', cls:'soon', left };
  return { key:'active', text:'이용중', cls:'active', left };
}
function updateStats() {
  const total = DOJJANGS.length;
  const statuses = DOJJANGS.map(getStatus);
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = statuses.filter(s => s.key === 'active' || s.key === 'soon').length;
  document.getElementById('statSoon').textContent = statuses.filter(s => s.key === 'soon').length;
  document.getElementById('statExpired').textContent = statuses.filter(s => s.key === 'expired').length;
}
function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('statusFilter').value = 'all';
  renderTable();
}
function renderTable() {
  const tbody = document.getElementById('dojangsTable');
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filter = document.getElementById('statusFilter').value;
  let rows = DOJJANGS.filter(d => {
    const s = getStatus(d);
    const hay = [d.dojang_name, d.owner_name, d.username, d.phone].join(' ').toLowerCase();
    return (!q || hay.includes(q)) && (filter === 'all' || s.key === filter);
  });
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">표시할 도장이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(d => {
    const s = getStatus(d);
    const leftText = s.left < 0 ? `${Math.abs(s.left)}일 지남` : `${s.left}일 남음`;
    const encoded = encodeURIComponent(JSON.stringify(d));
    return `<tr>
      <td><strong>${escapeHtml(d.dojang_name)}</strong><span class="sub-text">등록일 ${escapeHtml((d.created_at || '').slice(0,10) || '-')}</span></td>
      <td>${escapeHtml(d.owner_name || '-')}</td>
      <td><code>${escapeHtml(d.username)}</code></td>
      <td>${escapeHtml(d.phone || '-')}</td>
      <td>${escapeHtml(d.expires_at)}<span class="sub-text">${leftText}</span></td>
      <td><span class="badge ${s.cls}">${s.text}</span></td>
      <td><div class="action-btns">
        <button class="btn-sm btn-copy" onclick="copyAccount('${encoded}')">복사</button>
        <button class="btn-sm btn-edit" onclick="openEditModal('${encoded}')">수정</button>
        <button class="btn-sm btn-extend" onclick="extendDojang('${d.id}', '${d.expires_at}', 1)">+1개월</button>
        <button class="btn-sm btn-toggle" onclick="toggleActive('${d.id}', ${d.is_active})">${d.is_active ? '중지' : '활성'}</button>
        <button class="btn-sm btn-del" onclick="deleteDojang('${d.id}', '${escapeHtml(d.dojang_name)}')">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
}

function openAddModal() {
  document.getElementById('modalTitle').innerHTML = '도장 <span>추가</span>';
  document.getElementById('editId').value = '';
  ['mDojang','mOwner','mPhone','mUser','mPass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mUser').disabled = false;
  document.getElementById('passLabel').textContent = '비밀번호 *';
  document.getElementById('passHelp').textContent = '고객에게 전달할 임시 비밀번호를 입력하세요.';
  document.getElementById('mExpiry').value = addMonths(todayStr(), 12);
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalBg').classList.add('show');
}
function openEditModal(encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  document.getElementById('modalTitle').innerHTML = '도장 <span>수정</span>';
  document.getElementById('editId').value = d.id;
  document.getElementById('mDojang').value = d.dojang_name || '';
  document.getElementById('mOwner').value = d.owner_name || '';
  document.getElementById('mPhone').value = d.phone || '';
  document.getElementById('mUser').value = d.username || '';
  document.getElementById('mUser').disabled = true;
  document.getElementById('mPass').value = '';
  document.getElementById('passLabel').textContent = '새 비밀번호';
  document.getElementById('passHelp').textContent = '비워두면 기존 비밀번호가 유지됩니다. 변경할 때만 새 비밀번호를 입력하세요.';
  document.getElementById('mExpiry').value = d.expires_at || todayStr();
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
function quickExpiry(months) {
  const current = document.getElementById('mExpiry').value || todayStr();
  const base = current < todayStr() ? todayStr() : current;
  document.getElementById('mExpiry').value = addMonths(base, months);
}
async function isDuplicateUsername(username, currentId) {
  const found = await api('GET', `/rest/v1/dojangs?select=id&username=eq.${encodeURIComponent(username)}&limit=1`);
  return found.length > 0 && found[0].id !== currentId;
}
async function saveDojang() {
  const saveBtn = document.getElementById('saveBtn');
  const errEl = document.getElementById('modalErr');
  const id = document.getElementById('editId').value;
  const passwordValue = document.getElementById('mPass').value.trim();
  const body = {
    dojang_name: document.getElementById('mDojang').value.trim(),
    owner_name: document.getElementById('mOwner').value.trim(),
    phone: document.getElementById('mPhone').value.trim(),
    expires_at: document.getElementById('mExpiry').value
  };
  const username = document.getElementById('mUser').value.trim();
  if (!body.dojang_name || !username || !body.expires_at || (!id && !passwordValue)) {
    errEl.textContent = '도장명, 아이디, 비밀번호, 만료일은 필수입니다.'; return;
  }
  if (!/^[a-zA-Z0-9._-]{4,30}$/.test(username)) {
    errEl.textContent = '아이디는 영문/숫자/점/하이픈/밑줄 4~30자로 입력해주세요.'; return;
  }
  if (passwordValue && passwordValue.length < 6) { errEl.textContent = '비밀번호는 6자 이상으로 입력해주세요.'; return; }
  saveBtn.disabled = true;
  errEl.textContent = '';
  try {
    if (await isDuplicateUsername(username, id)) { errEl.textContent = '이미 사용 중인 아이디입니다.'; return; }
    if (id) {
      if (passwordValue) body.password = passwordValue;
      await api('PATCH', `/rest/v1/dojangs?id=eq.${id}`, body);
    } else {
      body.username = username;
      body.password = passwordValue;
      body.is_active = true;
      await api('POST', '/rest/v1/dojangs', body);
    }
    closeModal();
    await loadDojangs();
  } catch (err) {
    errEl.textContent = '저장 실패: ' + err.message;
  } finally {
    saveBtn.disabled = false;
  }
}
async function toggleActive(id, current) {
  try { await api('PATCH', `/rest/v1/dojangs?id=eq.${id}`, { is_active: !current }); await loadDojangs(); }
  catch (err) { alert('상태 변경 실패: ' + err.message); }
}
async function extendDojang(id, expiresAt, months) {
  const base = expiresAt < todayStr() ? todayStr() : expiresAt;
  const next = addMonths(base, months);
  if (!confirm(`만료일을 ${next}로 연장할까요?`)) return;
  try { await api('PATCH', `/rest/v1/dojangs?id=eq.${id}`, { expires_at: next, is_active: true }); await loadDojangs(); }
  catch (err) { alert('연장 실패: ' + err.message); }
}
async function deleteDojang(id, name) {
  const input = prompt(`정말 삭제하려면 도장명을 그대로 입력하세요.\n삭제 대상: ${name}`);
  if (input !== name) { alert('도장명이 일치하지 않아 삭제하지 않았습니다.'); return; }
  try { await api('DELETE', `/rest/v1/dojangs?id=eq.${id}`); await loadDojangs(); }
  catch (err) { alert('삭제 실패: ' + err.message); }
}
async function copyAccount(encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  const msg = `[AI KICK MASTER 이용 안내]\n\n도장명: ${d.dojang_name}\n아이디: ${d.username}\n비밀번호: ${d.password || '(관리자에게 문의)'}\n접속 링크: ${LOGIN_URL}\n사용 만료일: ${d.expires_at}\n\n크롬 또는 삼성인터넷에서 접속 후 로그인해서 사용하시면 됩니다.`;
  try {
    await navigator.clipboard.writeText(msg);
    alert('카톡 전달용 안내문을 복사했습니다.');
  } catch {
    prompt('복사 실패. 아래 내용을 직접 복사하세요.', msg);
  }
}

document.getElementById('pwModalBg').addEventListener('click', e => { if (e.target === e.currentTarget) closePwModal(); });
document.getElementById('modalBg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closePwModal(); }
});
if (sessionStorage.getItem('akm_admin_logged_in') === '1') {
  loadAdminPassword().then(() => {
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.add('show');
    loadDojangs();
  });
}
</script>
