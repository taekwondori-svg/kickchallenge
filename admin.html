<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI KICK MASTER · 관리자</title>
<style>
:root {
  --navy: #0A1628;
  --blue: #4ca3ff;
  --gold: #E8A020;
  --red: #D92B3A;
  --green: #2ecc71;
  --card: rgba(255,255,255,0.04);
  --border: rgba(76,163,255,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy); color: #fff;
  font-family: 'Noto Sans KR', system-ui, sans-serif;
  min-height: 100vh;
}

/* ── 로그인 ── */
#loginWrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
#loginWrap.hidden { display: none; }
.login-box {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 44px 40px;
  width: 360px; text-align: center;
}
.login-box h1 { font-size: 22px; font-weight: 900; margin-bottom: 6px; }
.login-box h1 span { color: var(--gold); }
.login-box p { font-size: 12px; color: #6a7a8a; margin-bottom: 30px; }
.f-input {
  width: 100%; padding: 13px 16px; margin-bottom: 12px;
  background: rgba(255,255,255,0.06); border: 1.5px solid var(--border);
  border-radius: 10px; color: #fff; font-size: 15px; outline: none;
}
.f-input:focus { border-color: var(--blue); }
.btn-primary {
  width: 100%; padding: 14px; background: var(--blue);
  border: none; border-radius: 10px; color: #fff;
  font-size: 15px; font-weight: 900; cursor: pointer;
}
.btn-primary:hover { opacity: 0.88; }
.err-msg { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

/* ── 대시보드 ── */
#dashboard { display: none; padding: 28px 32px; max-width: 960px; margin: 0 auto; }
#dashboard.show { display: block; }

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.top-bar h2 { font-size: 20px; font-weight: 900; }
.top-bar h2 span { color: var(--gold); }
.btn-add {
  padding: 10px 22px; background: var(--blue); border: none;
  border-radius: 10px; color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.btn-add:hover { opacity: 0.88; }

/* 통계 */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 20px; text-align: center;
}
.stat-card .num { font-size: 32px; font-weight: 900; color: var(--blue); }
.stat-card .label { font-size: 12px; color: #6a7a8a; margin-top: 4px; }

/* 테이블 */
.table-wrap {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
th {
  background: rgba(76,163,255,0.1); padding: 13px 16px;
  font-size: 12px; color: #7a90aa; font-weight: 700;
  text-align: left; border-bottom: 1px solid var(--border);
}
td {
  padding: 13px 16px; font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.03); }

.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge.active { background: rgba(46,204,113,0.15); color: var(--green); }
.badge.expired { background: rgba(217,43,58,0.15); color: var(--red); }
.badge.inactive { background: rgba(255,255,255,0.08); color: #6a7a8a; }

.action-btns { display: flex; gap: 8px; }
.btn-sm {
  padding: 5px 12px; border-radius: 7px; font-size: 12px;
  font-weight: 700; cursor: pointer; border: none;
}
.btn-edit { background: rgba(76,163,255,0.15); color: var(--blue); }
.btn-edit:hover { background: rgba(76,163,255,0.3); }
.btn-del { background: rgba(217,43,58,0.15); color: var(--red); }
.btn-del:hover { background: rgba(217,43,58,0.3); }
.btn-toggle { background: rgba(232,160,32,0.15); color: var(--gold); }
.btn-toggle:hover { background: rgba(232,160,32,0.3); }

.empty-msg { text-align: center; padding: 48px; color: #4a5a6a; }

/* ── 모달 ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 999;
  align-items: center; justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: #0f1e35; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 36px; width: 420px; max-width: 94vw;
}
.modal h3 { font-size: 18px; font-weight: 900; margin-bottom: 24px; }
.modal h3 span { color: var(--gold); }
.modal label { font-size: 12px; color: #7a90aa; font-weight: 700; display: block; margin-bottom: 6px; }
.modal .f-input { margin-bottom: 16px; }
.modal-btns { display: flex; gap: 10px; margin-top: 8px; }
.modal-btns button { flex: 1; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 900; cursor: pointer; }
.btn-cancel { background: rgba(255,255,255,0.08); color: #aaa; }
.btn-save { background: var(--blue); color: #fff; }
.btn-cancel:hover { background: rgba(255,255,255,0.15); }
.btn-save:hover { opacity: 0.88; }

.loading { text-align: center; padding: 40px; color: #4a5a6a; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginWrap">
  <div class="login-box">
    <h1>AI <span>KICK</span> MASTER</h1>
    <p>관리자 전용 페이지</p>
    <input id="adminPw" class="f-input" type="password" placeholder="관리자 비밀번호" />
    <button class="btn-primary" onclick="adminLogin()">로그인</button>
    <div class="err-msg" id="adminErr"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="dashboard">
  <div class="top-bar">
    <h2>AI <span>KICK</span> MASTER · 도장 관리</h2>
    <button class="btn-add" onclick="openAddModal()">+ 도장 추가</button>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">-</div>
      <div class="label">전체 도장</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statActive" style="color:var(--green)">-</div>
      <div class="label">이용 중</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statExpired" style="color:var(--red)">-</div>
      <div class="label">만료됨</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>도장명</th>
          <th>관장명</th>
          <th>아이디</th>
          <th>연락처</th>
          <th>만료일</th>
          <th>상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="dojangsTable">
        <tr><td colspan="7" class="loading">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 추가/수정 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">도장 <span>추가</span></h3>
    <input type="hidden" id="editId" />
    <label>도장명</label>
    <input id="mDojang" class="f-input" type="text" placeholder="예) 구미태권도장" />
    <label>관장명</label>
    <input id="mOwner" class="f-input" type="text" placeholder="예) 홍길동" />
    <label>연락처</label>
    <input id="mPhone" class="f-input" type="text" placeholder="예) 010-1234-5678" />
    <label>아이디</label>
    <input id="mUser" class="f-input" type="text" placeholder="예) gumi01" />
    <label>비밀번호</label>
    <input id="mPass" class="f-input" type="text" placeholder="예) tkd1234!" />
    <label>만료일</label>
    <input id="mExpiry" class="f-input" type="date" />
    <div class="err-msg" id="modalErr"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveDojang()">저장</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ebgoolsymyzkftvavpyj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_378Ep28vw4J9Sia2OsN6-Q_gqnu5OQJ';
const ADMIN_PASSWORD = 'akm_admin_2546!'; // ← 관리자 비밀번호 (나중에 변경 가능)

// ── 관리자 로그인 ──
function adminLogin() {
  const pw = document.getElementById('adminPw').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashboard').classList.add('show');
    loadDojangs();
  } else {
    document.getElementById('adminErr').textContent = '비밀번호가 올바르지 않습니다.';
  }
}
document.getElementById('adminPw').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

// ── API 공통 ──
async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + path, opts);
  if (method === 'DELETE') return true;
  return res.json();
}

// ── 도장 목록 불러오기 ──
async function loadDojangs() {
  const tbody = document.getElementById('dojangsTable');
  tbody.innerHTML = '<tr><td colspan="7" class="loading">불러오는 중...</td></tr>';

  const data = await api('GET', '/rest/v1/dojangs?select=*&order=created_at.desc');
  const today = new Date().toISOString().slice(0,10);

  // 통계
  const total = data.length;
  const active = data.filter(d => d.is_active && d.expires_at >= today).length;
  const expired = data.filter(d => d.expires_at < today).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statExpired').textContent = expired;

  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">등록된 도장이 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = data.map(d => {
    const isExpired = d.expires_at < today;
    const status = !d.is_active ? '비활성' : isExpired ? '만료' : '이용중';
    const badgeClass = !d.is_active ? 'inactive' : isExpired ? 'expired' : 'active';
    return `
      <tr>
        <td>${d.dojang_name}</td>
        <td>${d.owner_name || '-'}</td>
        <td><code>${d.username}</code></td>
        <td>${d.phone || '-'}</td>
        <td>${d.expires_at}</td>
        <td><span class="badge ${badgeClass}">${status}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn-sm btn-edit" onclick="openEditModal('${encodeURIComponent(JSON.stringify(d))}')">수정</button>
            <button class="btn-sm btn-toggle" onclick="toggleActive('${d.id}', ${d.is_active})">${d.is_active ? '중지' : '활성'}</button>
            <button class="btn-sm btn-del" onclick="deleteDojang('${d.id}', '${d.dojang_name}')">삭제</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

// ── 모달 ──
function openAddModal() {
  document.getElementById('modalTitle').innerHTML = '도장 <span>추가</span>';
  document.getElementById('editId').value = '';
  ['mDojang','mOwner','mPhone','mUser','mPass'].forEach(id => document.getElementById(id).value = '');
  // 기본 만료일: 1년 후
  const d = new Date(); d.setFullYear(d.getFullYear() + 1);
  document.getElementById('mExpiry').value = d.toISOString().slice(0,10);
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalBg').classList.add('show');
}

function openEditModal(encoded) {
  const d = JSON.parse(decodeURIComponent(encoded));
  document.getElementById('modalTitle').innerHTML = '도장 <span>수정</span>';
  document.getElementById('editId').value = d.id;
  document.getElementById('mDojang').value = d.dojang_name;
  document.getElementById('mOwner').value = d.owner_name || '';
  document.getElementById('mPhone').value = d.phone || '';
  document.getElementById('mUser').value = d.username;
  document.getElementById('mPass').value = d.password;
  document.getElementById('mExpiry').value = d.expires_at;
  document.getElementById('modalErr').textContent = '';
  document.getElementById('modalBg').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

async function saveDojang() {
  const id = document.getElementById('editId').value;
  const body = {
    dojang_name: document.getElementById('mDojang').value.trim(),
    owner_name:  document.getElementById('mOwner').value.trim(),
    phone:       document.getElementById('mPhone').value.trim(),
    username:    document.getElementById('mUser').value.trim(),
    password:    document.getElementById('mPass').value.trim(),
    expires_at:  document.getElementById('mExpiry').value,
  };

  if (!body.dojang_name || !body.username || !body.password || !body.expires_at) {
    document.getElementById('modalErr').textContent = '필수 항목을 모두 입력해주세요.';
    return;
  }

  if (id) {
    await api('PATCH', `/rest/v1/dojangs?id=eq.${id}`, body);
  } else {
    body.is_active = true;
    await api('POST', '/rest/v1/dojangs', body);
  }

  closeModal();
  loadDojangs();
}

async function toggleActive(id, current) {
  await api('PATCH', `/rest/v1/dojangs?id=eq.${id}`, { is_active: !current });
  loadDojangs();
}

async function deleteDojang(id, name) {
  if (!confirm(`"${name}" 도장을 삭제할까요?\n이 작업은 되돌릴 수 없습니다.`)) return;
  await api('DELETE', `/rest/v1/dojangs?id=eq.${id}`);
  loadDojangs();
}

// 모달 바깥 클릭 시 닫기
document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
