<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>점프마스터 · 나른랩스</title>
<!--
  jumpmaster.html  (나른랩스 · 점프마스터 v0.2 — 감지 엔진 개선판)
  ─────────────────────────────────────────────
  · 킥마스터와 같은 UI 언어(네이비 배경 + 청록/라임 액센트, Noto Sans KR).
  · MediaPipe Pose로 "엉덩이 높이(hipY)"를 추적해 몸이 위아래로 튀는 것을 세는 줄넘기 카운터.

  ★ v0.2 감지 개선 내용 (2026-07-08)
  1) 모델을 lite로 변경 → 프레임 속도 약 2배 (줄넘기는 정밀도보다 fps가 중요)
  2) 시작 버튼을 눌러도 기준선을 리셋하지 않음 (뛰는 도중 재캘리브레이션 버그 제거)
  3) 기준선 캘리브레이션: 평균 → "안정 구간의 중앙값" (움직이는 중엔 기준을 안 잡음)
  4) 착지 순간 카운트 → "이륙 순간" 카운트 (프레임 놓쳐도 카운트 누락 없음, 반응 빠름)
  5) 자동 감도: 아이의 실제 점프 높이(최근 피크 중앙값)에 문턱을 자동으로 맞춤
  6) 착지 크라우칭에 기준선이 끌려가는 문제 수정 (기준선 근처에서만 보정)
  7) 인식이 잠깐 끊겨도 2.5초간 기준선 유지 (한 프레임 놓쳐도 리셋 안 됨)
  8) requestVideoFrameCallback 사용 + 카메라 60fps 요청
  9) 기준선 표시가 켜져 있으면 좌상단에 fps/문턱/현재값 디버그 표시
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   나른랩스 · 점프마스터 디자인 토큰 (킥마스터와 공유하는 네이비 베이스 + 팀 컬러: 청록/라임)
   ============================================================ */
:root{
  --navy-900:#0A1628;
  --navy-800:#0d1e35;
  --navy-700:#112a47;
  --panel:rgba(5,14,26,.42);          /* 킥마스터처럼 얇고 은은한 패널(과한 글래스 X) */
  --panel-line:rgba(45,212,191,.30);
  --teal:#14B8A6;
  --teal-bright:#2DD4BF;
  --lime:#A3E635;
  --lime-bright:#BEF264;
  --ink:#EAF4F1;
  --muted:#8fa6bf;
  --danger:#ff7a90;
  --app-h:100vh;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;background:var(--navy-900);color:var(--ink);
  font-family:'Noto Sans KR',system-ui,sans-serif;overflow:hidden;overscroll-behavior:none;}
button{font-family:inherit;cursor:pointer;}

/* ============================================================
   시작 화면 (랜딩) — 변경 없음
   ============================================================ */
#startScreen{
  position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:6px;
  padding:calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px);
  background:
    radial-gradient(120% 90% at 50% 0%, #123a44 0%, var(--navy-900) 55%),
    var(--navy-900);
}
#startScreen.hidden{display:none;}
.brand-mark{font-size:13px;font-weight:700;letter-spacing:.22em;color:var(--teal-bright);
  text-transform:uppercase;margin-bottom:2px;}
.product-title{font-size:clamp(40px,13vw,72px);font-weight:900;line-height:.98;
  letter-spacing:-.02em;margin:0;
  background:linear-gradient(120deg,var(--lime) 0%,var(--teal-bright) 70%);
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.product-sub{font-size:15px;color:var(--muted);max-width:320px;line-height:1.5;margin:10px 0 4px;}
.hop-emblem{width:120px;height:64px;margin:14px 0 6px;position:relative;}
.hop-dot{position:absolute;bottom:6px;width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,var(--lime-bright),var(--teal));
  box-shadow:0 0 18px rgba(163,230,53,.6);animation:hop 1.05s cubic-bezier(.5,0,.5,1) infinite;}
.hop-dot:nth-child(1){left:14px;animation-delay:0s;}
.hop-dot:nth-child(2){left:52px;animation-delay:.12s;}
.hop-dot:nth-child(3){left:90px;animation-delay:.24s;}
@keyframes hop{0%,100%{transform:translateY(0) scale(1);}45%{transform:translateY(-40px) scale(.9);}}
.start-btn{margin-top:20px;border:none;border-radius:16px;padding:16px 40px;
  font-size:18px;font-weight:900;color:#052e2a;
  background:linear-gradient(120deg,var(--lime) 0%,var(--teal-bright) 100%);
  box-shadow:0 10px 30px rgba(20,184,166,.35);transition:transform .12s;}
.start-btn:active{transform:scale(.96);}
.start-note{font-size:12px;color:var(--muted);margin-top:14px;}

/* ============================================================
   앱 화면 (카메라 + HUD) — 킥마스터 레이아웃 재현
   ============================================================ */
#app{position:fixed;inset:0;height:var(--app-h);display:none;}
#app.show{display:block;}
#camWrap{position:absolute;inset:0;overflow:hidden;background:#000;}
#camWrap.mirrored #video, #camWrap.mirrored #overlay{transform:scaleX(-1);}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
#camWrap::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(5,12,22,.6) 0%,rgba(5,12,22,0) 24%,rgba(5,12,22,0) 60%,rgba(5,12,22,.66) 100%);}

.hud{position:absolute;inset:0;pointer-events:none;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
.hud > *{pointer-events:auto;}

/* ── 좌상단: 브랜드 스택 (박스 없이 플레인 텍스트, 킥마스터와 동일한 방식) ── */
.top-bar{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;padding:0 16px;pointer-events:none;z-index:6;}
.brand-stack{display:flex;flex-direction:column;gap:3px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.55));}
.bs-name{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.01em;}
.bs-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:var(--lime);
  letter-spacing:.16em;text-transform:uppercase;}
.bs-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(var(--lime),var(--teal));
  box-shadow:0 0 8px rgba(163,230,53,.7);}
.bs-meta{font-size:9.5px;color:var(--muted);font-weight:600;}

/* 우상단: 타이머 배지 (시간제 모드일 때만) */
#timerBadge{display:none;flex-direction:column;align-items:center;background:var(--panel);
  border:1px solid var(--panel-line);border-radius:12px;padding:7px 15px;backdrop-filter:blur(6px);
  pointer-events:auto;}
#timerBadge.show{display:flex;}
#timerNum{font-size:24px;font-weight:900;color:var(--lime);font-variant-numeric:tabular-nums;line-height:1;}
#timerLabel{font-size:9px;color:var(--muted);font-weight:700;margin-top:2px;}

/* ── 중앙 상단: 히어로 타이틀(모드명) + 안내 캡슐 (킥마스터 "앞차기 오른발" + 안내문구 자리) ── */
#modeBadge{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:50%;
  transform:translateX(-50%);text-align:center;max-width:76%;pointer-events:none;z-index:5;}
.mb-title{display:block;font-size:clamp(22px,5.6vw,34px);font-weight:900;letter-spacing:-.01em;line-height:1.05;
  background:linear-gradient(120deg,var(--lime) 0%,var(--teal-bright) 70%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 3px 14px rgba(0,0,0,.5));}
.mb-sub{display:block;font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:700;}

#guideMsg{position:absolute;top:calc(env(safe-area-inset-top) + 74px);left:50%;
  transform:translateX(-50%);background:rgba(5,12,22,.62);border:1px solid var(--panel-line);
  border-radius:999px;padding:8px 18px;font-size:12.5px;font-weight:700;backdrop-filter:blur(10px);
  text-align:center;max-width:82%;display:none;z-index:5;}
#guideMsg.show{display:block;}

/* ── 우측: 세로 스탯열 (킥마스터의 "이번 점수 / 횟수 / 평균" 자리) ── */
.stat-rail{position:absolute;right:16px;top:calc(env(safe-area-inset-top) + 112px);
  display:flex;flex-direction:column;align-items:flex-end;gap:20px;z-index:4;}
.stat-block{display:flex;flex-direction:column;align-items:flex-end;}
.sb-label{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;text-align:right;}
.sb-value{display:block;font-size:clamp(34px,9vw,56px);font-weight:900;line-height:.95;
  font-variant-numeric:tabular-nums;letter-spacing:-.02em;color:#fff;margin-top:4px;
  text-shadow:0 2px 16px rgba(0,0,0,.5);transition:color .1s;}
#countNum.pulse{animation:cpulse .18s ease-out;}
@keyframes cpulse{0%{transform:scale(1);}40%{transform:scale(1.14);color:var(--lime-bright);}100%{transform:scale(1);}}
.sb-value.lime{color:var(--lime);text-shadow:0 0 20px rgba(163,230,53,.45);}
.sb-state{font-size:10px;font-weight:700;color:var(--teal-bright);margin-top:8px;}
#statNow{position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;}

/* 점프 게이지 (스탯열 맨 위, 세로 바) */
.gauge{position:relative;width:10px;height:86px;border-radius:8px;background:rgba(9,22,40,.55);
  border:1px solid var(--panel-line);overflow:hidden;margin-top:7px;backdrop-filter:blur(4px);}
.gauge-fill{position:absolute;left:0;right:0;bottom:0;height:0%;
  background:linear-gradient(180deg,var(--lime) 0%,var(--teal) 100%);
  box-shadow:0 0 12px rgba(163,230,53,.5);transition:height .05s linear;}
.gauge-tick{position:absolute;left:-3px;right:-3px;height:2px;background:rgba(255,255,255,.35);}

/* ── 좌측: 모드 레일 (킥마스터의 "발차기 모드 / 격파 모드 / 겨루기 모드" 자리) ── */
.mode-rail{position:absolute;left:16px;top:calc(env(safe-area-inset-top) + 112px);
  display:flex;flex-direction:column;gap:10px;width:118px;z-index:4;}
.mode-btn{width:100%;padding:10px 12px;border-radius:10px;font-size:12px;font-weight:800;
  color:var(--ink);background:var(--panel);border:none;border-left:4px solid transparent;
  text-align:left;line-height:1.2;backdrop-filter:blur(6px);transition:.15s;}
.mode-btn small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:2px;}
.mode-btn.active{border-left-color:var(--lime);background:rgba(20,184,166,.22);color:#fff;}
.mode-btn.active small{color:var(--lime-bright);}
.mode-btn:active{transform:scale(.97);}

/* ── 좌하단: 목표(시간) 설정 + 감도 + 시작 버튼 (킥마스터의 "목표 횟수 / 시작!" 자리) ── */
.bottom-left{position:absolute;left:16px;bottom:calc(env(safe-area-inset-bottom) + 14px);
  display:flex;flex-direction:column;gap:8px;width:min(230px,56vw);z-index:6;}
.time-select{display:none;flex-direction:column;gap:3px;background:var(--panel);
  border:1px solid var(--panel-line);border-radius:11px;padding:8px 12px;backdrop-filter:blur(6px);}
.time-select.show{display:flex;}
.time-select label{font-size:10px;color:var(--muted);font-weight:700;}
.time-select select{margin-top:2px;background:var(--navy-800);color:#fff;border:1px solid var(--panel-line);
  border-radius:8px;padding:6px 8px;font-size:13px;font-weight:800;font-family:inherit;}
.sens-box{display:flex;flex-direction:column;gap:5px;background:var(--panel);
  border:1px solid var(--panel-line);border-radius:11px;padding:8px 12px;backdrop-filter:blur(6px);}
.sens-box label{font-size:10px;color:var(--muted);font-weight:700;}
.sens-box .sens-row{display:flex;align-items:center;gap:8px;}
.sens-box input[type=range]{flex:1;accent-color:var(--teal-bright);}
.sens-box .sv{font-size:11px;font-weight:800;color:var(--lime);width:28px;text-align:right;}
.auto-row{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;
  color:var(--lime-bright);margin-top:2px;user-select:none;cursor:pointer;}
.auto-row input[type=checkbox]{accent-color:var(--lime);width:14px;height:14px;margin:0;}

.start-cta{border:none;border-radius:14px;padding:16px 0;width:100%;
  font-size:16.5px;font-weight:900;color:#052e2a;margin-top:2px;
  background:linear-gradient(120deg,var(--lime) 0%,var(--teal-bright) 100%);
  box-shadow:0 8px 24px rgba(20,184,166,.35);transition:transform .1s;}
.start-cta:active{transform:scale(.97);}
.start-cta.playing{background:linear-gradient(120deg,#ff9db0,#ff7a90);color:#3a0a12;
  box-shadow:0 8px 24px rgba(255,122,144,.3);}
.start-cta:disabled{opacity:.7;}

/* ── 우하단: 아이콘 버튼들 (킥마스터의 "카메라 전환 / 전체화면" 자리) ── */
.bottom-right{position:absolute;right:16px;bottom:calc(env(safe-area-inset-bottom) + 14px);
  display:flex;flex-direction:column;align-items:flex-end;gap:7px;z-index:6;}
.mini-btn{background:var(--panel);border:1px solid rgba(255,255,255,.10);border-radius:10px;
  padding:8px 13px;font-size:11px;font-weight:700;color:var(--ink);backdrop-filter:blur(6px);white-space:nowrap;}

/* 안내 / 카운트다운 / 결과 오버레이 (항상 최상단) */
#readyOverlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(5,12,22,.4);backdrop-filter:blur(2px);z-index:20;}
#readyOverlay.show{display:flex;}
#readyNum{font-size:120px;font-weight:900;color:var(--lime-bright);
  text-shadow:0 0 40px rgba(163,230,53,.5);}
#readySub{font-size:15px;color:var(--ink);margin-top:8px;font-weight:700;}
#resultOverlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;background:rgba(5,12,22,.66);backdrop-filter:blur(6px);text-align:center;z-index:20;}
#resultOverlay.show{display:flex;}
#resultIcon{font-size:56px;}
#resultBig{font-size:44px;font-weight:900;color:var(--lime-bright);
  text-shadow:0 0 30px rgba(163,230,53,.4);}
#resultSub{font-size:15px;color:var(--ink);font-weight:700;}
#resultNote{font-size:12px;color:var(--muted);margin-top:2px;}
.result-again{margin-top:16px;border:none;border-radius:14px;padding:13px 34px;font-size:16px;
  font-weight:900;color:#052e2a;background:linear-gradient(120deg,var(--lime),var(--teal-bright));}

/* 색종이 */
.confetti-piece{position:fixed;top:-24px;font-size:22px;z-index:120;pointer-events:none;
  animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9;}}

/* 반응형 (좁은 폰) */
@media (max-width:420px){
  .mode-rail{width:96px;top:calc(env(safe-area-inset-top) + 128px);}
  .mode-btn{font-size:11px;padding:9px 8px;}
  .stat-rail{top:calc(env(safe-area-inset-top) + 128px);gap:14px;}
  .sb-value{font-size:clamp(28px,10vw,42px);}
  .gauge{height:64px;}
  .bottom-left{width:min(200px,60vw);}
  .mb-title{font-size:clamp(20px,7vw,28px);}
}
@media (prefers-reduced-motion:reduce){
  .hop-dot,#countNum.pulse{animation:none;}
  .confetti-piece{animation-duration:.01s;}
}


/* ============================================================
   UI SYNC PATCH 2026-07-08
   킥마스터 HUD 방향에 맞춘 점프마스터 UI 정리
   - 기능 JS 변경 없음
   - 팀 컬러(청록/라임) 유지
   - 버튼 테두리 제거, 플레인 텍스트/밑줄 중심
   - 좌상단 정품 인증 영역을 킥마스터식 브랜드 스택으로 정리
   ============================================================ */
:root{
  --jm-glow:rgba(45,212,191,.72);
  --jm-glow-soft:rgba(45,212,191,.26);
  --jm-shadow:0 3px 14px rgba(0,0,0,.86);
}

/* 카메라 오버레이: 킥마스터처럼 중앙은 살리고 외곽만 은은하게 */
#camWrap::after{
  background:
    radial-gradient(ellipse at center,
      rgba(5,12,22,0.00) 0%,
      rgba(5,12,22,0.02) 44%,
      rgba(5,12,22,0.08) 68%,
      rgba(5,12,22,0.20) 100%),
    linear-gradient(180deg,
      rgba(5,12,22,.30) 0%,
      rgba(5,12,22,.10) 20%,
      rgba(5,12,22,0.00) 46%,
      rgba(5,12,22,.08) 74%,
      rgba(5,12,22,.46) 100%) !important;
}

/* 좌상단 인증/브랜드: 박스 없이 정보만 선명하게 */
.top-bar{padding:0 18px !important;}
.brand-stack{
  gap:2px !important;
  filter:drop-shadow(0 3px 10px rgba(0,0,0,.78)) !important;
}
.bs-name{
  font-size:18px !important;
  font-weight:1000 !important;
  color:#fff !important;
  letter-spacing:-.04em !important;
  line-height:1.05 !important;
}
.bs-tag{
  display:inline-flex !important;
  width:max-content !important;
  gap:6px !important;
  font-size:10px !important;
  font-weight:900 !important;
  letter-spacing:.08em !important;
  color:var(--lime-bright) !important;
  text-shadow:0 0 10px rgba(163,230,53,.42) !important;
}
.bs-dot{
  width:7px !important;
  height:7px !important;
  background:var(--lime) !important;
  box-shadow:0 0 10px rgba(163,230,53,.85) !important;
}
.bs-meta{
  font-size:9.5px !important;
  font-weight:700 !important;
  color:rgba(234,244,241,.48) !important;
}

/* 중앙 타이틀: 킥마스터처럼 더 또렷하게 */
#modeBadge{top:calc(env(safe-area-inset-top) + 14px) !important;}
.mb-title{
  font-size:clamp(24px,5.8vw,36px) !important;
  font-weight:1000 !important;
  text-shadow:none !important;
  filter:drop-shadow(0 3px 14px rgba(0,0,0,.72)) !important;
}
.mb-sub{
  font-size:12px !important;
  font-weight:800 !important;
  color:rgba(234,244,241,.68) !important;
  text-shadow:0 2px 8px rgba(0,0,0,.80) !important;
}
#guideMsg{
  background:rgba(5,12,22,.46) !important;
  border:none !important;
  box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.08) !important;
  color:rgba(234,244,241,.92) !important;
}

/* 좌측 모드 레일: 버튼 박스/테두리 제거, 선택만 라임 밑줄 */
.mode-rail{
  left:18px !important;
  top:calc(env(safe-area-inset-top) + 142px) !important;
  width:132px !important;
  gap:12px !important;
}

let audioCtx=null;
function ensureAudio(){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume(); }catch(e){} }
function tone(freq,dur,type='sine',vol=.18,delay=0){
  if(!audioCtx) return;
  const t=audioCtx.currentTime+delay;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur);
}

    s.style.animationDuration=(1.4+Math.random()*1.3)+'s';
    s.style.fontSize=(16+Math.random()*16)+'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2800);
  }
}

/* ============================================================
   오늘 최고 기록 (localStorage · 도메인 분리라 jm_ 접두어)
   ============================================================ */
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function bestKey(mode){ return 'jm_best_'+mode; }
function loadBest(mode){
  try{ const o=JSON.parse(localStorage.getItem(bestKey(mode))||'null');
    if(!o||o.date!==todayKey()) return 0; return o.value||0; }catch(e){ return 0; }
}
function saveBest(mode,value){
  const prev=loadBest(mode);
  if(value>prev){ try{ localStorage.setItem(bestKey(mode),JSON.stringify({date:todayKey(),value})); }catch(e){} return true; }
  return false;
}

/* ============================================================
   줄넘기 감지 — 엉덩이 높이 기반 바운스 카운트 (v0.2 엔진)
   ─────────────────────────────────────────────
   · 스무딩: 속도 적응형 (빨리 움직일 땐 즉각 반응, 가만히 있을 땐 부드럽게)
     → 고정 스무딩이 점프 피크를 깎아먹던 문제 해결
   · 캘리브레이션: "가만히 서 있는 안정 구간"의 중앙값으로 기준선 확정
     → 움직이는 도중에 엉뚱한 기준선이 잡히던 문제 해결
   · 카운트 시점: 이륙(문턱 상향 돌파) 순간 → 프레임이 낮아도 착지 프레임을
     놓쳐서 카운트가 빠지는 일이 없고 소리 피드백도 빠름
   · 자동 감도: 최근 점프 피크의 중앙값 × 0.55를 문턱으로 사용
     → 점프가 낮은 아이도, 높은 아이도 각자 높이에 맞게 자동 조절
   ============================================================ */
function currentUP(){
  if(autoSens && recentPeaks.length>=3){
    const s=[...recentPeaks].sort((a,b)=>a-b);
    const med=s[Math.floor(s.length/2)];
    // 자동 문턱: 하한선(JUMP_MIN_UP) ~ 슬라이더값 사이에서 아이 점프 높이에 맞춤
    return Math.min(JUMP_UP_RATIO, Math.max(JUMP_MIN_UP, med*AUTO_PEAK_RATIO));
  }
  return JUMP_UP_RATIO;
}

function smoothHip(rawY, now){
  if(jumpHipY==null){ jumpHipY=rawY; lastFrameT=now; return; }
  const dt=Math.max(1, now-lastFrameT); lastFrameT=now;
  // 속도 적응형 알파: 느린 움직임 0.35 ~ 빠른 움직임 0.85
  const vel=Math.abs(rawY-jumpHipY)/dt;             // (정규화 좌표)/ms
  const a=Math.min(0.85, 0.35 + vel*900);
  jumpHipY = jumpHipY*(1-a) + rawY*a;
}

function detectJump(hipY, torso){
  if(!(torso>0.02)) return;
  curTorso=torso;
  const now=performance.now();
  smoothHip(hipY, now);

  // ── 기준선 최초 캘리브레이션: "안정 구간"의 중앙값 ──
  if(jumpBaselineY==null){
    calibratingBaseline=true;
    jumpBaselineSamples.push(jumpHipY);
    if(jumpBaselineSamples.length>BASELINE_CALIB_FRAMES) jumpBaselineSamples.shift();
    if(!running) setGuide('⚖️ 기준 잡는 중… 가만히 서주세요');
    if(jumpBaselineSamples.length>=BASELINE_CALIB_FRAMES){
      const mn=Math.min(...jumpBaselineSamples), mx=Math.max(...jumpBaselineSamples);
      if((mx-mn) < BASELINE_STABLE_RANGE){ // 가만히 서 있을 때만 기준선 확정
        const s=[...jumpBaselineSamples].sort((a,b)=>a-b);
        jumpBaselineY=s[Math.floor(s.length/2)];   // 평균 대신 중앙값 (튀는 값에 강함)
        jumpBaselineSamples=[]; calibratingBaseline=false;
        if(!running) setGuide('');
      }
      // 안정되지 않았으면 오래된 샘플을 버리며 안정될 때까지 계속 수집
    }
    return;
  }

  const UP=currentUP(), DOWN=UP*JUMP_HYSTERESIS;
  const riseNorm=(jumpBaselineY - jumpHipY)/torso; // >0 이면 baseline보다 위로 뜬 상태
  curRiseNorm=Math.max(0,riseNorm);

  // ── 기준선 보정: 서 있고 + 기준선 근처일 때만 (착지 크라우칭에 안 끌려가게) ──
  if(jumpState==='ground' && Math.abs(riseNorm) < UP*0.5){
    const drift = running ? 0.025 : 0.08; // 측정 중엔 더 천천히
    jumpBaselineY = jumpBaselineY*(1-drift) + jumpHipY*drift;
  }

  if(jumpState==='ground'){
    // ★ 이륙 순간 카운트: 문턱을 위로 돌파하면 즉시 1회 인정
    if(riseNorm>UP && (now-jumpLastT)>JUMP_MIN_GAP_MS){
      jumpState='air'; airStartT=now; peakRise=riseNorm;
      if(running){ // 측정 중일 때만 카운트 (대기/카운트다운 중 점프는 세지 않음)
        jumpCount++; jumpLastT=now;
        onJumpCounted();
      } else { jumpLastT=now; }
    }
  } else { // air
    peakRise=Math.max(peakRise,riseNorm);
    if(riseNorm<DOWN){
      // 착지 → 재장전 + 이번 점프의 피크를 자동 감도에 반영
      jumpState='ground'; statState.textContent=running?'착지':'준비';
      recentPeaks.push(peakRise);
      if(recentPeaks.length>AUTO_PEAK_WINDOW) recentPeaks.shift();
    } else if((now-airStartT)>AIR_MAX_MS){
      // 공중 상태가 비정상적으로 길다 = 기준선이 잘못됨 → 자동 재캘리브레이션
      jumpState='ground';
      jumpBaselineY=null; jumpBaselineSamples=[];
    }
  }
}
function onJumpCounted(){
  countNum.textContent=jumpCount;
  countNum.classList.remove('pulse'); void countNum.offsetWidth; countNum.classList.add('pulse');
  statNow.textContent=jumpCount; statState.textContent='점프!';
  sndHop();
  if(jumpCount%10===0){ sndTen(jumpCount); confetti(false); }
  if(jumpCount%50===0){ confetti(true); }
}

/* ============================================================
   게임 흐름
   ============================================================ */
function setGuide(text){ if(text){ guideMsg.textContent=text; guideMsg.classList.add('show'); } else guideMsg.classList.remove('show'); }

window.setMode=(mode)=>{
  if(running){ stopGame(); }
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  const cfg=MODES[mode];
  modeBadge.querySelector('.mb-title').textContent=cfg.title;
  modeBadge.querySelector('.mb-sub').textContent=cfg.sub;
  timeSelect.classList.toggle('show',cfg.timed);
  countLabel.textContent = mode==='streak' ? '연속 성공' : '줄넘기 개수';
  resetCount(); updateStats();
  setStartCta(false,'▶ 시작!');
};

function resetCount(){
  // ★ v0.2: 기준선(jumpBaselineY)은 리셋하지 않음!
  //   시작 전에 계속 추적해 둔 기준선을 그대로 써야
  //   카운트다운 직후 첫 점프부터 정확히 잡힘.
  //   (아이가 바뀌면 "기준 재설정" 버튼으로 명시적으로 리셋)
  jumpCount=0; jumpState='ground'; jumpLastT=0; curRiseNorm=0; peakRise=0;
  countNum.textContent='0'; statNow.textContent='0'; statState.textContent=running?'측정중':'준비';
}
function fullRecalibrate(){
  jumpHipY=null; jumpBaselineY=null; jumpBaselineSamples=[]; calibratingBaseline=false;
  recentPeaks=[]; jumpState='ground'; curRiseNorm=0; peakRise=0; lostSince=null;
}
function updateStats(){
  statBest.textContent = (loadBest(currentMode)||'—') + (loadBest(currentMode)?'개':'');
}
function setStartCta(playing,text){
  startCta.classList.toggle('playing',playing);
  startCta.textContent=text;
}

function runReadyCountdown(sub,cb){
  const token=++readyToken;
  if(readyTimer) clearTimeout(readyTimer);
  const steps=['3','2','1','시작!']; let i=0;
  readyOverlay.classList.add('show'); readySub.textContent=sub;
  (function next(){
    if(token!==readyToken) return;
    if(i>=steps.length){ readyOverlay.classList.remove('show'); readyTimer=null; cb(); return; }
    readyNum.textContent=steps[i];
    if(i<3) sndCount(); else sndGo();
    i++; readyTimer=setTimeout(next,i<=3?800:600);
  })();
}

window.startGame=()=>{
  ensureAudio();
  if(running){ // 중지
    stopGame(); setStartCta(false,'▶ 시작!'); statState.textContent='중단'; return;
  }
  resultOverlay.classList.remove('show');
  resetCount(); setStartCta(true,'⏳ 준비중...'); startCta.disabled=true;
  const subs={free:'멈추고 싶을 때 종료를 누르세요',timed:'제한 시간 안에 최대한 많이!',streak:'리듬 끊기지 않게!'};
  const startMode=currentMode;
  runReadyCountdown(subs[currentMode]||'',()=>{
    if(currentMode!==startMode) return;
    running=true; startCta.disabled=false; setStartCta(true,'■ 종료');
    statState.textContent='측정중';
    if(MODES[currentMode].timed){
      const sec=parseInt(timeSel.value||'30');
      startTimer(sec, finishTimed);
    }
    jumpLastT=performance.now(); // 스트릭 타임아웃 기준 초기화
  });
};

function startTimer(sec,onEnd){
  if(gameTimer) clearInterval(gameTimer);
  gameRemain=sec; timerNum.textContent=sec; timerBadge.classList.add('show');
  gameTimer=setInterval(()=>{
    gameRemain--; timerNum.textContent=Math.max(0,gameRemain);
    if(gameRemain<=0){ clearInterval(gameTimer); gameTimer=null; onEnd(); }
  },1000);
}

function stopGame(){
  readyToken++;
  if(readyTimer){ clearTimeout(readyTimer); readyTimer=null; }
  if(gameTimer){ clearInterval(gameTimer); gameTimer=null; }
  running=false; readyOverlay.classList.remove('show'); timerBadge.classList.remove('show');
}

function finishTimed(){
  running=false; timerBadge.classList.remove('show');
  showResult(jumpCount,'시간 종료!','제한 '+timeSel.value+'초');
}
function finishStreak(){
  running=false; sndBreak();
  showResult(jumpCount,'리듬이 끊겼어요','연속 '+jumpCount+'개 성공');
}

function showResult(cnt,sub,note){
  const isBest=saveBest(currentMode,cnt);
  document.getElementById('resultIcon').textContent = isBest?'🏆':(cnt>0?'🎉':'💪');
  document.getElementById('resultBig').textContent=cnt+'개';
  document.getElementById('resultSub').textContent=sub;
  document.getElementById('resultNote').textContent=(isBest?'🎊 오늘 최고 기록 갱신! · ':'')+note;
  resultOverlay.classList.add('show');
  setStartCta(false,'▶ 다시!'); updateStats();
  if(cnt>0) sndFinish();
  if(isBest && cnt>0) confetti(true);
}

/* ============================================================
   MediaPipe + 카메라 루프
   ============================================================ */
async function initModel(){
  setGuide('AI 모델 로딩 중…');
  const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  // ★ v0.2: lite 모델 기본 사용 — 줄넘기 감지는 랜드마크 정밀도보다 프레임 속도가 중요
  const MODEL_URL = MODEL_VARIANT==='full'
    ? "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task"
    : "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task";
  try{ // 1차: GPU 가속
    poseLandmarker=await PoseLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:MODEL_URL,delegate:"GPU"}, runningMode:"VIDEO", numPoses:1 });
  }catch(gpuErr){ // 2차: 구형기기 CPU 폴백
    console.warn('GPU 실패 → CPU 전환', gpuErr); setGuide('AI 모델 로딩 중… (호환 모드)');
    poseLandmarker=await PoseLandmarker.createFromOptions(vision,{
      baseOptions:{modelAssetPath:MODEL_URL,delegate:"CPU"}, runningMode:"VIDEO", numPoses:1 });
  }
  drawingUtils=new DrawingUtils(ctx);
}
async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  try{
    // ★ v0.2: 60fps 요청 (지원 기기에서 감지 시간 해상도 2배)
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode,width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}},audio:false});
    video.srcObject=stream; await video.play();
    setGuide('🔍 전신이 보이게 뒤로 물러서세요');
  }catch(e){ setGuide('카메라 실패: '+e.message); }
}

function drawCalibration(hipCanvasY, baseCanvasY){
  if(!showCalib) return;
  const airborne=(jumpState==='air');
  // 기준선(서 있을 때 엉덩이 높이)
  ctx.save();
  ctx.strokeStyle=airborne?'rgba(163,230,53,.95)':'rgba(20,184,166,.7)';
  ctx.lineWidth=airborne?4:2; ctx.setLineDash([12,10]);
  ctx.beginPath(); ctx.moveTo(0,baseCanvasY); ctx.lineTo(canvas.width,baseCanvasY); ctx.stroke();
  ctx.setLineDash([]);
  // 이륙 문턱선 (이 선을 넘으면 카운트) — 얇은 라임 점선
  if(curTorso){
    const upY=baseCanvasY - currentUP()*curTorso*canvas.height;
    ctx.strokeStyle='rgba(190,242,100,.5)'; ctx.lineWidth=1.5; ctx.setLineDash([4,6]);
    ctx.beginPath(); ctx.moveTo(0,upY); ctx.lineTo(canvas.width,upY); ctx.stroke();
    ctx.setLineDash([]);
  }
  // 현재 엉덩이 위치 마커
  ctx.fillStyle=airborne?'rgba(190,242,100,1)':'rgba(45,212,191,1)';
  ctx.beginPath(); ctx.arc(canvas.width/2, hipCanvasY, airborne?9:6, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawDebug(){
  if(!showCalib) return;
  // 좌상단 디버그: fps / 문턱 / 현재 뜬 정도 (미러링 보정해서 그림)
  ctx.save();
  if(camWrap.classList.contains('mirrored')){ ctx.translate(canvas.width,0); ctx.scale(-1,1); }
  ctx.font='bold 13px monospace';
  ctx.fillStyle='rgba(190,242,100,.85)';
  const up=currentUP();
  const auto=(autoSens && recentPeaks.length>=3)?' 자동':'';
  ctx.fillText(Math.round(fpsEMA)+'fps · 문턱 '+up.toFixed(3)+auto+' · 현재 '+curRiseNorm.toFixed(3), 10, canvas.height-14);
  ctx.restore();
}

function processFrame(){
  if(poseLandmarker && video.readyState>=2 && video.currentTime!==lastVideoTime){
    lastVideoTime=video.currentTime;
    if(canvas.width!==video.videoWidth){ canvas.width=video.videoWidth; canvas.height=video.videoHeight; }

    // fps 측정 (디버그 표시용)
    const nowT=performance.now();
    if(processFrame._t){ const inst=1000/Math.max(1,nowT-processFrame._t); fpsEMA=fpsEMA?fpsEMA*0.9+inst*0.1:inst; }
    processFrame._t=nowT;

    const result=poseLandmarker.detectForVideo(video,nowT);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(result.landmarks && result.landmarks.length>0){
      const lm=result.landmarks[0];
      const hipVis=Math.max(lm[23]?.visibility??0, lm[24]?.visibility??0);
      const shVis =Math.max(lm[11]?.visibility??0, lm[12]?.visibility??0);
      if(hipVis>0.3 && shVis>0.3){
        personVisible=true; lostSince=null; setGuide(calibratingBaseline&&!running?'⚖️ 기준 잡는 중… 가만히 서주세요':'');
        // 스켈레톤 (팀 컬러)
        drawingUtils.drawConnectors(lm,PoseLandmarker.POSE_CONNECTIONS,{color:'rgba(20,184,166,.55)',lineWidth:2});
        drawingUtils.drawLandmarks(lm,{color:'#A3E635',lineWidth:1,radius:3});

        const hipY=(lm[23].y+lm[24].y)/2;
        const shoulderY=(lm[11].y+lm[12].y)/2;
        const torso=hipY-shoulderY;

        detectJump(hipY,torso); // 측정 전에도 기준선을 계속 추적 (시작하면 바로 반응)
        if(running && currentMode==='streak' && jumpCount>0 && (performance.now()-jumpLastT)>STREAK_TIMEOUT_MS){
          finishStreak();
        }
        // 게이지 (뜬 정도 → 0~100%). 현재 문턱을 71% 위치로 스케일
        const UP=currentUP();
        const pct=Math.max(0,Math.min(100,(curRiseNorm/(UP*1.4))*100));
        gaugeFill.style.height=pct+'%';
        gaugeTick.style.bottom=(100/1.4)+'%';

        // 보정선 그리기
        if(jumpBaselineY!=null){
          drawCalibration(jumpHipY*canvas.height, jumpBaselineY*canvas.height);
        }
        drawDebug();
      } else {
        handlePersonLost();
      }
    } else {
      handlePersonLost();
    }
  }
}
function handlePersonLost(){
  personVisible=false;
  if(!running) setGuide('🔍 전신이 보이게 뒤로 물러서세요');
  gaugeFill.style.height='0%';
  // ★ v0.2: 잠깐 끊긴 것으로는 기준선을 지우지 않음 (grace 시간)
  const now=performance.now();
  if(lostSince==null){ lostSince=now; return; }
  if(now-lostSince>LOST_GRACE_MS){
    jumpHipY=null; jumpBaselineY=null; jumpBaselineSamples=[]; jumpState='ground';
    lostSince=null;
  }
}

/* 감지 루프: 가능하면 requestVideoFrameCallback (새 비디오 프레임마다 정확히 1회) */
function loop(){
  if('requestVideoFrameCallback' in HTMLVideoElement.prototype){
    const onFrame=()=>{ processFrame(); video.requestVideoFrameCallback(onFrame); };
    video.requestVideoFrameCallback(onFrame);
  } else {
    (function raf(){ processFrame(); requestAnimationFrame(raf); })();
  }
}

/* ============================================================
   버튼/입력 핸들러
   ============================================================ */
document.getElementById('enterBtn').onclick=async()=>{
  ensureAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  await initModel(); await startCamera(); loop();
  updateStats();
};
document.getElementById('flipBtn').onclick=async()=>{
  facingMode=(facingMode==='user')?'environment':'user';
  camWrap.classList.toggle('mirrored',facingMode==='user');
  await startCamera();
  fullRecalibrate(); // 카메라가 바뀌면 기준선도 새로
};
document.getElementById('fsBtn').onclick=()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement && !document.webkitFullscreenElement){
    (el.requestFullscreen||el.webkitRequestFullscreen)?.call(el);
    document.getElementById('fsBtn').textContent='✕ 전체화면 끄기';
  } else { (document.exitFullscreen||document.webkitExitFullscreen)?.call(document);
    document.getElementById('fsBtn').textContent='⛶ 전체화면'; }
};
document.getElementById('calBtn').onclick=(e)=>{
  showCalib=!showCalib; e.target.textContent=showCalib?'👁 기준선 켜짐':'👁 기준선 꺼짐';
};
document.getElementById('recalBtn').onclick=()=>{
  // 다음 아이/자세가 바뀌었을 때: 기준선 + 자동 감도 기억까지 전부 새로
  fullRecalibrate();
  setGuide('⚖️ 기준 다시 잡는 중… 가만히 서주세요');
};
sensSlider.oninput=()=>{
  JUMP_UP_RATIO=sliderToRatio(parseInt(sensSlider.value));
  sensVal.textContent=sensSlider.value;
};
autoSensChk.onchange=()=>{ autoSens=autoSensChk.checked; };
// 초기 감도값 반영
JUMP_UP_RATIO=sliderToRatio(parseInt(sensSlider.value));
autoSens=autoSensChk.checked;

/* ============================================================
   모바일 뷰포트 높이 보정 (아이폰 주소창 대응)
   ============================================================ */
function setAppHeight(){
  const h=Math.max(320, Math.floor(window.innerHeight||document.documentElement.clientHeight));
  document.documentElement.style.setProperty('--app-h', h+'px');
}
setAppHeight();
window.addEventListener('resize',setAppHeight,{passive:true});
window.addEventListener('orientationchange',()=>setTimeout(setAppHeight,250),{passive:true});
if(window.visualViewport) window.visualViewport.addEventListener('resize',setAppHeight,{passive:true});
</script>
