<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>AI KICK MASTER · 성장 기록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--black:#050505;--dark:#0b0d12;--red:#e52626;--bg:#f4f5f7;--card:#fff;--line:#e7e9ee;--text:#111318;--muted:#707783;--green:#16a765;--blue:#2563eb;--gold:#f59e0b;--shadow:0 24px 80px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;letter-spacing:-.25px}a{text-decoration:none;color:inherit}button,input,select{font-family:inherit}body{background:radial-gradient(circle at 88% 0%,rgba(229,38,38,.12),transparent 30%),radial-gradient(circle at 12% 8%,rgba(37,99,235,.08),transparent 28%),linear-gradient(180deg,#fff 0%,#f4f5f7 420px,#f4f5f7 100%)}
.app{width:min(1240px,calc(100% - 36px));margin:0 auto;padding:22px 0 40px}.topbar{height:74px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:13px;min-width:0}.logo-img{height:44px;max-width:260px;display:block}.top-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill{height:38px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.80);display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:900;color:#333;box-shadow:0 8px 22px rgba(0,0,0,.035)}.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(22,167,101,.12)}.btn{border:0;cursor:pointer;transition:.18s ease;display:inline-flex;align-items:center;justify-content:center;gap:9px;font-weight:950}.btn:hover{transform:translateY(-1px)}.btn-dark{height:42px;padding:0 17px;border-radius:13px;background:#111318;color:#fff;box-shadow:0 14px 30px rgba(0,0,0,.14)}.btn-light{height:42px;padding:0 17px;border-radius:13px;background:#fff;color:#111318;border:1px solid var(--line);box-shadow:0 10px 24px rgba(0,0,0,.04)}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;margin-bottom:18px}.hero-main{position:relative;overflow:hidden;border-radius:32px;background:linear-gradient(135deg,#070707,#171821 58%,#080808);color:#fff;padding:30px 34px;min-height:246px;box-shadow:var(--shadow)}.hero-main:before{content:"";position:absolute;right:-130px;top:-170px;width:430px;height:430px;border-radius:50%;border:1px solid rgba(229,38,38,.42)}.hero-content{position:relative;z-index:2}.eyebrow{display:inline-flex;align-items:center;gap:8px;height:31px;padding:0 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:12px;font-weight:900;color:#f0f0f2;margin-bottom:18px}.hero h1{font-size:44px;line-height:1.08;letter-spacing:-2px;font-weight:950;margin-bottom:12px}.hero h1 span{color:#ff4b4b}.hero p{font-size:16px;line-height:1.6;color:#c8cbd2;font-weight:650;margin-bottom:22px}.filters{display:flex;gap:10px;flex-wrap:wrap}.select,.search{height:46px;border-radius:15px;border:1px solid rgba(255,255,255,.16);outline:none;padding:0 14px;font-size:14px;font-weight:900;background:rgba(255,255,255,.09);color:#fff;min-width:170px}.select option{color:#111}.search{min-width:230px}.search::placeholder{color:#aeb4bf}.profile-card{border-radius:32px;background:#fff;border:1px solid var(--line);box-shadow:0 18px 60px rgba(0,0,0,.06);padding:24px;position:relative;overflow:hidden}.avatar{width:64px;height:64px;border-radius:22px;background:#111318;color:#fff;display:grid;place-items:center;font-weight:950;font-size:22px;box-shadow:0 16px 30px rgba(0,0,0,.14)}.profile-top{display:flex;align-items:center;gap:14px}.profile-name b{font-size:24px;font-weight:950}.profile-name span{display:block;margin-top:5px;font-size:13px;color:var(--muted);font-weight:850}.profile-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:18px}.mini{border-radius:16px;background:#fafafa;border:1px solid var(--line);padding:12px 8px;text-align:center}.mini b{display:block;font-size:20px;font-weight:950}.mini span{display:block;margin-top:3px;font-size:11px;color:var(--muted);font-weight:850}
.kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.kpi-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px 20px;box-shadow:0 14px 44px rgba(0,0,0,.045);position:relative;overflow:hidden}.kpi-card:after{content:"";position:absolute;right:16px;top:16px;width:8px;height:8px;border-radius:50%;background:var(--red);opacity:.65}.kpi-card .label{font-size:12px;color:var(--muted);font-weight:900;margin-bottom:10px}.kpi-card .num{font-size:38px;font-weight:950;line-height:1;color:#111318;letter-spacing:-1.4px}.kpi-card .num small{font-size:18px}.kpi-card.dark{background:#111318;color:#fff;border-color:#111318}.kpi-card.dark .label{color:#bbc0ca}.kpi-card.dark .num{color:#fff}.kpi-card.gold .num{color:var(--gold)}.kpi-card.red .num{color:var(--red)}
.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:start}.panel{background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 60px rgba(0,0,0,.055);overflow:hidden}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:22px 24px 16px;border-bottom:1px solid var(--line)}.panel-title h2{font-size:19px;font-weight:950}.panel-title span{display:block;margin-top:4px;font-size:12px;color:var(--muted);font-weight:800}.chart-wrap{padding:22px 24px 26px;height:300px;display:flex;align-items:flex-end;gap:8px}.bar{flex:1;min-width:20px;border-radius:13px 13px 6px 6px;background:linear-gradient(180deg,var(--red),#ff8b8b);position:relative}.bar span{position:absolute;left:50%;top:-24px;transform:translateX(-50%);font-size:11px;font-weight:950}.bar em{position:absolute;left:50%;bottom:-22px;transform:translateX(-50%);font-style:normal;font-size:10px;color:var(--muted);font-weight:800;white-space:nowrap}.list{padding:18px 24px 24px;display:grid;gap:10px}.item{min-height:62px;border-radius:18px;border:1px solid var(--line);background:#fff;display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:12px 14px}.item.hot{border-color:rgba(229,38,38,.24);background:#fff7f7}.ico{width:36px;height:36px;border-radius:13px;background:#111318;color:#fff;display:grid;place-items:center;font-size:16px;font-weight:950}.item.hot .ico{background:var(--red)}.txt b{font-size:14px;font-weight:950}.txt span{display:block;margin-top:3px;font-size:11px;color:var(--muted);font-weight:800}.value{font-size:14px;font-weight:950;color:var(--red);white-space:nowrap}.empty{padding:40px 24px;text-align:center;color:var(--muted);font-weight:850;line-height:1.6}.notice{margin-top:18px;background:#111318;color:#fff;border-radius:26px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 18px 60px rgba(0,0,0,.12)}.notice b{font-size:16px;font-weight:950}.notice span{display:block;margin-top:5px;color:#c9ced8;font-size:13px;font-weight:750;line-height:1.5}
@media(max-width:980px){.hero,.grid{grid-template-columns:1fr}.kpi{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.app{width:min(100% - 24px,1240px);padding-top:14px}.topbar{height:auto;align-items:flex-start}.logo-img{height:36px}.top-actions{gap:6px}.pill{display:none}.btn-dark,.btn-light{height:38px;padding:0 12px;font-size:12px}.hero-main{padding:24px;border-radius:26px}.hero h1{font-size:31px}.filters{display:grid}.select,.search{width:100%;min-width:0}.kpi{grid-template-columns:1fr}.chart-wrap{height:240px;padding:18px}.notice{align-items:flex-start;flex-direction:column}.notice .btn{width:100%}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a class="brand" href="home.html" aria-label="AI KICK MASTER 홈"><img class="logo-img" src="logo.svg" alt="AI KICK MASTER"></a>
    <div class="top-actions"><div class="pill"><span class="status-dot"></span> 로컬 기록 조회</div><a class="btn btn-light" href="home.html">도장 홈</a><a id="startLink" class="btn btn-dark" href="aikickmaster.html">측정 시작</a></div>
  </header>
  <section class="hero">
    <div class="hero-main">
      <div class="hero-content"><div class="eyebrow">STUDENT GROWTH RECORD</div><h1>학생별 <span>성장 기록</span>을<br>바로 확인하세요</h1><p>이 화면은 각 태블릿 브라우저의 localStorage에 저장된 학생과 측정 기록을 조회합니다.</p><div class="filters"><select class="select" id="studentSelect"></select><input class="search" id="studentSearch" list="studentList" placeholder="또는 이름으로 검색" /><datalist id="studentList"></datalist></div></div>
    </div>
    <aside class="profile-card" id="profileCard"><div class="profile-top"><div class="avatar" id="avatar">?</div><div class="profile-name"><b id="profileName">학생 선택</b><span id="profileMeta">학생을 선택하면 개인 기록이 표시됩니다.</span></div></div><div class="profile-mini"><div class="mini"><b id="miniCount">-</b><span>측정 횟수</span></div><div class="mini"><b id="miniBest">-</b><span>최고 기록</span></div><div class="mini"><b id="miniLast">-</b><span>최근 측정</span></div></div></aside>
  </section>
  <section class="kpi"><div class="kpi-card dark"><div class="label">최근 평균</div><div class="num" id="kAvg">-</div></div><div class="kpi-card gold"><div class="label">최고 점수</div><div class="num" id="kBest">-</div></div><div class="kpi-card red"><div class="label">최고 콤보</div><div class="num" id="kCombo">-</div></div><div class="kpi-card"><div class="label">누적 격파</div><div class="num" id="kBalloon">-</div></div></section>
  <main class="grid"><section class="panel"><div class="panel-head"><div class="panel-title"><h2>최근 점수 흐름</h2><span>발차기 연습 평균 기록 기준</span></div></div><div class="chart-wrap" id="chart"></div></section><section class="panel"><div class="panel-head"><div class="panel-title"><h2>최근 측정 기록</h2><span>최신순 10개</span></div></div><div class="list" id="recentList"></div></section></main>
  <section class="notice"><div><b>상담용 한 줄 요약</b><span id="summaryText">학생을 선택하면 상담용 성장 요약이 자동으로 표시됩니다.</span></div><button class="btn btn-light" onclick="window.print()">인쇄</button></section>
</div>
<script>
const STORAGE_KEY='akm_home_state_v1';
const ACTIVE_KEY='akm_active_roster_v1';
let state={students:[],records:[]};
let currentStudentId='';
function readState(){try{const raw=localStorage.getItem(STORAGE_KEY); state=raw?JSON.parse(raw):{students:[],records:[]};}catch(e){state={students:[],records:[]};} state.students=Array.isArray(state.students)?state.students:[]; state.records=Array.isArray(state.records)?state.records:[];}
function activeIds(){try{return JSON.parse(localStorage.getItem(ACTIVE_KEY)||'[]')||[];}catch(e){return [];}}
function fmtDate(iso){if(!iso)return '-'; const d=new Date(iso); if(isNaN(d))return '-'; return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function dateShort(iso){if(!iso)return '-'; const d=new Date(iso); if(isNaN(d))return '-'; return `${d.getMonth()+1}/${d.getDate()}`;}
function esc(s){return String(s||'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function recordMainValue(r){if(r.kind==='drill')return (r.avg??0)+'점'; if(r.kind==='sparring')return (r.damage??0)+' dmg'; if(r.kind==='balloon')return (r.count??0)+'개'; return '-';}
function recordSub(r){if(r.kind==='drill')return `${r.modeLabel||'발차기'} · ${r.count||0}회 · 최고 ${r.best??'-'}점`; if(r.kind==='sparring')return `겨루기 · 최고 ${r.maxCombo||0}콤보 · ${r.ko?'K.O.':'완료'}`; if(r.kind==='balloon')return `격파 모드 · 난이도 ${r.difficulty||'-'}`; return r.modeLabel||'';}
function renderSelect(){const sel=document.getElementById('studentSelect'); const dl=document.getElementById('studentList'); sel.innerHTML='<option value="">학생 선택</option>'+state.students.map(s=>`<option value="${esc(s.id)}">${esc(s.name)} · ${esc(s.className||'반 없음')} · ${esc(s.belt||'띠 없음')}</option>`).join(''); dl.innerHTML=state.students.map(s=>`<option value="${esc(s.name)}"></option>`).join('');}
function selectStudent(id){currentStudentId=id; document.getElementById('studentSelect').value=id||''; const ids=id?[id]:[]; try{localStorage.setItem(ACTIVE_KEY,JSON.stringify(ids));}catch(e){} document.getElementById('startLink').href=id?`aikickmaster.html?roster=${encodeURIComponent(id)}`:'aikickmaster.html'; renderStudent();}
function recordsOf(id){return state.records.filter(r=>r.studentId===id).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));}
function renderStudent(){const s=state.students.find(x=>x.id===currentStudentId); const recs=s?recordsOf(s.id):[]; document.getElementById('avatar').textContent=s?(s.name||'?').slice(0,1):'?'; document.getElementById('profileName').textContent=s?s.name:'학생 선택'; document.getElementById('profileMeta').textContent=s?`${s.className||'반 없음'} · ${s.belt||'띠 없음'}`:'학생을 선택하면 개인 기록이 표시됩니다.'; document.getElementById('miniCount').textContent=s?recs.length:'-'; document.getElementById('miniBest').textContent=s?bestScore(recs):'-'; document.getElementById('miniLast').textContent=s&&recs[0]?fmtDate(recs[0].createdAt):'-';
const drill=recs.filter(r=>r.kind==='drill'&&typeof r.avg==='number'); const avg=drill.length?Math.round(drill.slice(0,5).reduce((a,b)=>a+b.avg,0)/Math.min(5,drill.length)):null; document.getElementById('kAvg').innerHTML=avg==null?'-':avg+'<small>점</small>'; document.getElementById('kBest').innerHTML=bestScore(recs)==='-'?'-':bestScore(recs)+'<small>점</small>'; const combo=Math.max(0,...recs.map(r=>r.maxCombo||0)); document.getElementById('kCombo').innerHTML=combo?combo+'<small>COMBO</small>':'-'; const balloons=recs.filter(r=>r.kind==='balloon').reduce((a,b)=>a+(b.count||0),0); document.getElementById('kBalloon').innerHTML=balloons?balloons+'<small>개</small>':'-'; renderChart(drill); renderRecent(recs); renderSummary(s,recs,avg);}
function bestScore(recs){const vals=[]; recs.forEach(r=>{if(typeof r.best==='number')vals.push(r.best); if(typeof r.avg==='number')vals.push(r.avg);}); return vals.length?Math.max(...vals):'-';}
function renderChart(drill){const box=document.getElementById('chart'); const data=drill.slice(0,8).reverse(); if(!data.length){box.innerHTML='<div class="empty">아직 발차기 연습 기록이 없습니다.<br>측정을 완료하면 자동으로 표시됩니다.</div>';return;} box.innerHTML=data.map(r=>{const h=Math.max(12,Math.min(100,r.avg||0));return `<div class="bar" style="height:${h}%"><span>${r.avg}점</span><em>${dateShort(r.createdAt)}</em></div>`}).join('');}
function renderRecent(recs){const list=document.getElementById('recentList'); if(!recs.length){list.innerHTML='<div class="empty">아직 저장된 측정 기록이 없습니다.</div>';return;} list.innerHTML=recs.slice(0,10).map((r,i)=>`<div class="item ${i===0?'hot':''}"><div class="ico">${i+1}</div><div class="txt"><b>${esc(r.modeLabel||r.kind||'측정')}</b><span>${esc(recordSub(r))} · ${fmtDate(r.createdAt)}</span></div><div class="value">${esc(recordMainValue(r))}</div></div>`).join('');}
function renderSummary(s,recs,avg){const el=document.getElementById('summaryText'); if(!s){el.textContent='학생을 선택하면 상담용 성장 요약이 자동으로 표시됩니다.';return;} if(!recs.length){el.textContent=`${s.name} 학생은 아직 측정 기록이 없습니다. 먼저 발차기 측정을 진행하세요.`;return;} const best=bestScore(recs); const last=recs[0]; el.textContent=`${s.name} 학생은 총 ${recs.length}회 측정했고, 최근 평균 ${avg==null?'-':avg+'점'}, 최고 기록 ${best==='-'?'-':best+'점'}입니다. 최근 활동은 ${last.modeLabel||'측정'}입니다.`;}
function init(){readState(); renderSelect(); const act=activeIds(); if(act.length && state.students.some(s=>s.id===act[0])) selectStudent(act[0]); else if(state.students.length) selectStudent(state.students[0].id); else renderStudent();}
document.getElementById('studentSelect').addEventListener('change',e=>selectStudent(e.target.value));
document.getElementById('studentSearch').addEventListener('change',e=>{const q=e.target.value.trim(); const s=state.students.find(x=>x.name===q)||state.students.find(x=>x.name.includes(q)); if(s)selectStudent(s.id);});
init();
</script>
</body>
</html>
